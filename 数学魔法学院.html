function mdRender(text) {
  text = String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  text = text.replace(/\*([^*]+)\*/g, '<i>$1</i>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

// ---- TTS（朗读） / STT（语音输入） ----
const TTS = {
  synth: window.speechSynthesis || null,
  voices: [], current: null, currentBtn: null,
  load() { if (this.synth) this.voices = this.synth.getVoices() || []; },
  pickVoice() {
    if (!this.voices.length) this.load();
    let v = this.voices.find(v => /zh-CN|cmn-Hans/i.test(v.lang) && /xiao|yao|hui|ting|female|woman|女/i.test(v.name||''));
    if (!v) v = this.voices.find(v => v.lang && /^zh/i.test(v.lang));
    return v || this.voices[0] || null;
  },
  stripMd(t) {
    return String(t||'')
      .replace(/```[\s\S]*?```/g,'，')
      .replace(/`([^`]+)`/g,'$1').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1')
      .replace(/<[^>]+>/g,'').replace(/\n+/g,'。').replace(/[。]{2,}/g,'。');
  },
  paramsFor(id) {
    let h = 0; const s = id||'';
    for (let i=0;i<s.length;i++) h = (h*131 + s.charCodeAt(i)) | 0;
    h = Math.abs(h);
    return { pitch: 0.85 + ((h % 60)/100), rate: 0.92 + (((h>>5) % 26)/100) };
  },
  speak(text, id, btn) {
    if (!this.synth) { toast('当前浏览器不支持朗读，请用 Chrome/Edge'); return false; }
    if (!this.voices.length) this.load();
    try { this.synth.resume(); } catch(e){}
    const wasActive = this.synth.speaking || this.synth.pending;
    if (wasActive) { try { this.synth.cancel(); } catch(e){} }
    if (this.currentBtn) this.currentBtn.classList.remove('playing');
    const u = new SpeechSynthesisUtterance(this.stripMd(text));
    u.lang = 'zh-CN';
    const v = this.pickVoice(); if (v) u.voice = v;
    const p = this.paramsFor(id||''); u.pitch = p.pitch; u.rate = p.rate; u.volume = 1.0;
    u.onend = ()=>{ if (btn) btn.classList.remove('playing'); this.current=null; this.currentBtn=null; };
    u.onerror = (ev)=>{ if (btn) btn.classList.remove('playing'); this.current=null; this.currentBtn=null; };
    this.current = u; this.currentBtn = btn || null;
    if (btn) btn.classList.add('playing');
    const go = ()=>{ if (this.current!==u) return; try { this.synth.speak(u); } catch(e){} };
    if (wasActive) setTimeout(go, 120); else go();
    return true;
  },
  stop() { try { this.synth && this.synth.cancel(); } catch(e){} if (this.currentBtn) this.currentBtn.classList.remove('playing'); this.current=null; this.currentBtn=null; },
  available() { return !!this.synth; }
};
if (TTS.synth) { TTS.load(); TTS.synth.onvoiceschanged = ()=>TTS.load(); }

const STT = {
  Rec: window.SpeechRecognition || window.webkitSpeechRecognition || null,
  instance: null,
  available() { return !!this.Rec; },
  start(opts) {
    if (!this.Rec) { toast('当前浏览器不支持语音输入，请用 Chrome/Edge'); return null; }
    if (this.instance) { try { this.instance.stop(); } catch(e){} this.instance = null; }
    const r = new this.Rec();
    r.lang = 'zh-CN'; r.continuous = false; r.interimResults = true; r.maxAlternatives = 1;
    r.onresult = ev=>{ let txt=''; for (let i=0;i<ev.results.length;i++) txt += ev.results[i][0].transcript; opts.onResult && opts.onResult(txt, ev.results[ev.results.length-1].isFinal); };
    r.onerror = ev=>{ opts.onError && opts.onError(ev.error||'未知错误'); };
    r.onend = ()=>{ this.instance = null; opts.onEnd && opts.onEnd(); };
    try { r.start(); this.instance = r; return r; } catch(e) { opts.onError && opts.onError(e.message||String(e)); return null; }
  },
  stop() { if (this.instance) { try { this.instance.stop(); } catch(e){} this.instance = null; } }
};

function buildSystemPrompt(sci) {
  return `你正在扮演数学家「${sci.name}」（${sci.years}，主要领域：${sci.field}）。\n你的一句名言："${sci.quote}"\n\n对方是一个 12 岁的中国孩子（刚上初一），正在学数学。请：\n1. 以该数学家的口吻、第一人称回答，符合 TA 的时代与性格（如高斯严谨自信、欧拉亲切多产、阿基米德痴迷动手、华罗庚励志勤奋、祖冲之/刘徽朴实精算）；\n2. 用孩子能懂的语言、生活例子、可视化比喻来讲；\n3. 数学事实必须准确，推导要对，不能编造；不确定就坦诚说不知道；\n4. 若问题超出 TA 时代的认知，可坦诚说"以我那个年代还想不到"，再用今天的数学帮孩子理解；\n5. 适当讲 1 小段 TA 真实的小故事或时代背景，让历史变生动；\n6. 鼓励孩子继续问，末尾留 1 个引导性问题；\n7. 全程简体中文，每次回复 100~250 字；\n8. 用 **粗体** 强调关键词，公式/符号用 \`反引号\` 标注（例如 \`a²+b²=c²\`）。\n\n不要破坏角色扮演。如果孩子问"你真的是 XXX 吗"，就以那位数学家的身份回答。`;
}

async function callLLM(messages) {
  const cfg = state.llm;
  if (!cfg || !cfg.apiKey) throw new Error('请先点【⚙️ 设置】填入 API Key');
  // Claude(Anthropic) 的接口格式与 OpenAI 不同，按 baseUrl/模型名自动分流
  const isAnthropic = /anthropic\.com/i.test(cfg.baseUrl||'') || /^claude/i.test(cfg.model||'');
  return isAnthropic ? callAnthropic(cfg, messages) : callOpenAICompat(cfg, messages);
}

// OpenAI 兼容：DeepSeek / 通义 / 智谱 / Kimi / GPT / Gemini(OpenAI兼容端点) 等
async function callOpenAICompat(cfg, messages) {
  const url = (cfg.baseUrl||'').replace(/\/+$/,'') + '/chat/completions';
  const model = cfg.model || 'deepseek-chat';
  const isNewOpenAI = /^(gpt-5|o\d)/i.test(model);
  const body = { model, messages };
  if (isNewOpenAI) { body.max_completion_tokens = 1200; }
  else { body.max_tokens = 700; body.temperature = 0.8; }
  let res;
  try {
    res = await fetch(url, { method:'POST', headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + cfg.apiKey }, body: JSON.stringify(body) });
  } catch(e) {
    throw new Error('网络/CORS 失败：'+e.message+'。提示：部分接口（如 Gemini 官方地址）不支持浏览器直连，需在 Base URL 填你自己的中转/代理地址。');
  }
  if (!res.ok) {
    let detail = '';
    try { detail = (await res.json()).error?.message || ''; } catch(e){}
    if (res.status===400 && isNewOpenAI && /max_tokens/i.test(detail)) {
      const res2 = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey}, body: JSON.stringify({ model, messages, max_tokens: 1200 }) });
      if (res2.ok) { const d = await res2.json(); return d.choices?.[0]?.message?.content || '(无返回)'; }
    }
    throw new Error(`HTTP ${res.status} ${res.statusText}${detail?'：'+detail:''}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '(无返回)';
}

// Anthropic 原生：system 为顶层字段、messages 仅 user/assistant 且首条须 user、max_tokens 必填、回包取 content[].text
async function callAnthropic(cfg, messages) {
  const url = (cfg.baseUrl||'https://api.anthropic.com/v1').replace(/\/+$/,'') + '/messages';
  const system = messages.filter(m=>m.role==='system').map(m=>m.content).join('\n\n');
  let msgs = messages.filter(m=>m.role!=='system').map(m=>({ role: m.role==='assistant'?'assistant':'user', content: String(m.content) }));
  while (msgs.length && msgs[0].role!=='user') msgs.shift();   // Claude 要求首条必须是 user
  const body = { model: cfg.model || 'claude-haiku-4-5', max_tokens: 1024, temperature: 0.8, messages: msgs };
  if (system) body.system = system;
  let res;
  try {
    res = await fetch(url, {
      method:'POST',
      headers: { 'content-type':'application/json', 'x-api-key':cfg.apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify(body)
    });
  } catch(e) {
    throw new Error('网络/CORS 失败：'+e.message+'。Claude 官方地址需科学上网。');
  }
  if (!res.ok) {
    let detail = '';
    try { detail = (await res.json()).error?.message || ''; } catch(e){}
    throw new Error(`HTTP ${res.status} ${res.statusText}${detail?'：'+detail:''}`);
  }
  const data = await res.json();
  return (data.content||[]).find(b=>b && b.type==='text')?.text || '(无返回)';
}

function ttsButton(text, id, label='🔊 听') {
  const b = el('button', 'tts-btn', label);
  b.onclick = (ev)=>{ ev.stopPropagation(); if (b.classList.contains('playing')) { TTS.stop(); return; } TTS.speak(text, id, b); };
  return b;
}

// ---- 语音连续对话舱 ----
const VoiceChat = {
  active:false, state:'idle', sciId:null, rec:null, lastTranscript:'', silenceTimer:null, ui:null, silenceMs:1300,
  enter(sciId) {
    if (!STT.available()) { toast('当前浏览器不支持语音输入，请用 Chrome 或 Edge'); return; }
    if (!state.llm || !state.llm.apiKey) { toast('请先在【⚙️ 设置】里填 API Key'); openLLMSettings(); return; }
    if (!state.chatConv) state.chatConv = [];
    this.active = true; this.sciId = sciId || state.chatSci || MATHEMATICIANS[0].id;
    this.buildUI();
    const sci = MATHEMATICIANS.find(s=>s.id===this.sciId) || MATHEMATICIANS[0];
    const greet = `你好！我是${sci.name}。我们直接说话就行——你说完我就接话。今天想聊点什么数学话题？`;
    this.appendTurn('sci', greet, sci);
    state.chatConv.push({ role:'assistant', content: greet }); saveState();
    this.speakReply(greet, sci);
  },
  exit() { this.active=false; this.setState('idle'); this.stopRec(); TTS.stop(); if (this.silenceTimer){clearTimeout(this.silenceTimer);this.silenceTimer=null;} this.destroyUI(); },
  setState(s) { this.state = s; this.updateUI(); },
  startRec() {
    if (!this.active) return;
    this.stopRec(); this.setState('listen'); this.lastTranscript='';
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { this.exit(); return; }
    const r = new SR(); r.lang='zh-CN'; r.continuous=true; r.interimResults=true; r.maxAlternatives=1;
    r.onresult = (ev)=>{ if (this.state!=='listen') return; let txt=''; for (let i=0;i<ev.results.length;i++) txt += ev.results[i][0].transcript; this.lastTranscript=txt; this.updateLive(txt); this.resetSilence(); };
    r.onerror = (ev)=>{ const err=ev?.error||'unknown'; if (err==='not-allowed'||err==='service-not-allowed'){ this.appendTurn('err','麦克风没有权限，请在浏览器地址栏开启麦克风权限再试。'); this.exit(); } };
    r.onend = ()=>{ if (!this.active||this.state!=='listen') return; if (this.lastTranscript.trim()) this.submit(); else setTimeout(()=>{ if (this.active&&this.state==='listen') this.startRec(); }, 250); };
    try { r.start(); this.rec=r; } catch(e) { setTimeout(()=>{ if (this.active&&this.state==='listen') this.startRec(); }, 400); }
  },
  stopRec() { if (this.rec){ try{this.rec.stop();}catch(e){} this.rec=null; } if (this.silenceTimer){clearTimeout(this.silenceTimer);this.silenceTimer=null;} },
  resetSilence() { if (this.silenceTimer) clearTimeout(this.silenceTimer); this.silenceTimer = setTimeout(()=>{ if (this.state==='listen'&&this.lastTranscript.trim()&&this.active) this.submit(); }, this.silenceMs); },
  async submit() {
    if (!this.active) return;
    if (this.silenceTimer){clearTimeout(this.silenceTimer);this.silenceTimer=null;}
    const text = (this.lastTranscript||'').trim(); this.lastTranscript=''; this.stopRec();
    if (!text) { this.startRec(); return; }
    this.setState('thinking'); this.appendTurn('user', text);
    state.chatConv.push({ role:'user', content:text }); saveState(); this.updateLive('');
    const sci = MATHEMATICIANS.find(s=>s.id===this.sciId) || MATHEMATICIANS[0];
    try {
      const sys = buildSystemPrompt(sci) + '\n\n【特别注意】此刻是「连续语音对话」：回复请 (a) 60~140 字；(b) 最自然口语，像面对面聊；(c) 不要列表、不要长公式，能比喻就比喻；(d) 末尾用一个开放问题反问孩子；(e) 若孩子只说"嗯""然后呢"，就主动把上个话题展开讲。';
      const reply = await callLLM([{ role:'system', content:sys }, ...state.chatConv.map(m=>({role:m.role,content:m.content}))]);
      if (!this.active) return;
      state.chatConv.push({ role:'assistant', content:reply }); this.appendTurn('sci', reply, sci);
      state.chatAsked = (state.chatAsked||0)+1; saveState();
      this.speakReply(reply, sci);
    } catch(e) { if (!this.active) return; this.appendTurn('err','调用失败：'+e.message); setTimeout(()=>{ if (this.active) this.startRec(); }, 800); }
  },
  speakReply(text, sci) {
    this.setState('speak');
    if (!TTS.available() || !TTS.synth) { setTimeout(()=>{ if (this.active) this.startRec(); }, 400); return; }
    try { TTS.synth.cancel(); } catch(e){}
    const u = new SpeechSynthesisUtterance(TTS.stripMd(text)); u.lang='zh-CN';
    const v = TTS.pickVoice(); if (v) u.voice=v;
    const p = TTS.paramsFor(sci.id); u.pitch=p.pitch; u.rate=p.rate; u.volume=1.0;
    u.onend = ()=>{ if (!this.active) return; setTimeout(()=>{ if (this.active&&this.state==='speak') this.startRec(); }, 300); };
    u.onerror = ()=>{ if (!this.active) return; setTimeout(()=>{ if (this.active&&this.state==='speak') this.startRec(); }, 300); };
    TTS.synth.speak(u);
    setTimeout(()=>{ if (this.active&&this.state==='speak'&&!TTS.synth.speaking) this.startRec(); }, Math.max(8000, text.length*250));
  },
  buildUI() {
    const sci = MATHEMATICIANS.find(s=>s.id===this.sciId) || MATHEMATICIANS[0];
    const mask = el('div','vc-mask');
    mask.innerHTML = `
      <div class="vc-card">
        <div class="vc-top">
          <div class="vc-sci"><div class="vc-avatar">${sci.face}</div><div><div style="font-size:18px;font-weight:800;color:var(--gold)">${sci.name}</div><div style="font-size:12px;color:var(--text-dim)">${sci.years} · ${sci.field}</div></div></div>
          <button id="vcExit">✖ 退出</button>
        </div>
        <div class="vc-orb-wrap"><div class="vc-orb" id="vcOrb"></div></div>
        <div class="vc-status" id="vcStatus">准备开始……</div>
        <div class="vc-transcript" id="vcTranscript"></div>
        <div class="vc-live" id="vcLive"></div>
        <div class="vc-bottom">
          <button id="vcPause">⏸ 暂停</button>
          <button id="vcSkip" title="跳过他说的，直接你说">⏭ 让我说</button>
          <button id="vcClear">🗑 清空记忆</button>
        </div>
      </div>`;
    document.body.appendChild(mask);
    this.ui = { mask, orb:$('#vcOrb',mask), status:$('#vcStatus',mask), transcript:$('#vcTranscript',mask), live:$('#vcLive',mask) };
    $('#vcExit',mask).onclick = ()=>this.exit();
    $('#vcPause',mask).onclick = ()=>{ if (['listen','thinking','speak'].includes(this.state)){ TTS.stop(); this.stopRec(); this.setState('paused'); } else if (this.state==='paused'){ this.startRec(); } };
    $('#vcSkip',mask).onclick = ()=>{ TTS.stop(); if (this.active) this.startRec(); };
    $('#vcClear',mask).onclick = ()=>{
      if (!confirm('清空和这位数学家的对话记忆？')) return;
      state.chatConv = []; saveState(); this.ui.transcript.innerHTML='';
      const sci = MATHEMATICIANS.find(s=>s.id===this.sciId) || MATHEMATICIANS[0];
      const greet = `好，我们重新开始。我是${sci.name}，你想聊什么？`;
      this.appendTurn('sci', greet, sci); state.chatConv.push({ role:'assistant', content:greet }); saveState();
      TTS.stop(); this.stopRec(); this.speakReply(greet, sci);
    };
  },
  destroyUI() { if (this.ui && this.ui.mask) this.ui.mask.remove(); this.ui=null; },
  updateUI() {
    if (!this.ui) return;
    ['idle','listen','thinking','speak','paused'].forEach(c=>this.ui.orb.classList.remove('vc-'+c));
    this.ui.orb.classList.add('vc-'+this.state);
    const msg = { idle:'', listen:'🎙️ 我在听……（你说话就行，停 1 秒我就接话）', thinking:'💭 我在想……', speak:'🗣️ 我正在说话（点 ⏭ 让我说可打断）', paused:'⏸ 已暂停（点 ▶ 继续）' };
    this.ui.status.textContent = msg[this.state] || '';
    if (this.state !== 'listen') this.updateLive('');
    const pb = $('#vcPause', this.ui.mask); if (pb) pb.textContent = this.state==='paused' ? '▶ 继续' : '⏸ 暂停';
  },
  updateLive(text) { if (this.ui && this.ui.live) this.ui.live.textContent = text ? '「'+text+'」' : ''; },
  appendTurn(role, content, sci) {
    if (!this.ui) return;
    const row = el('div','');
    if (role==='user') row.innerHTML = `<div class="vc-bubble user">${mdRender(content)}</div>`;
    else if (role==='sci') row.innerHTML = `<div class="vc-bubble sci"><b style="color:var(--gold)">${sci?sci.name:'数学家'}：</b>${mdRender(content)}</div>`;
    else row.innerHTML = `<div class="vc-bubble err">⚠️ ${content}</div>`;
    this.ui.transcript.appendChild(row); this.ui.transcript.scrollTop = this.ui.transcript.scrollHeight;
  }
};

// ---- 问数学家 · 聊天核心（可挂到整页，也可挂到浮层）----
function buildChatInto(host, mode) {
  speech.stop();
  if (!state.chatConv) state.chatConv = [];
  if (!state.chatSci) state.chatSci = MATHEMATICIANS[0].id;
  if (!state.llm) state.llm = { baseUrl:'https://api.deepseek.com/v1', model:'deepseek-chat', apiKey:'' };
  const curSci = MATHEMATICIANS.find(s=>s.id===state.chatSci) || MATHEMATICIANS[0];
  const opts = MATHEMATICIANS.map(s=>`<option value="${s.id}" ${s.id===curSci.id?'selected':''}>${s.face} ${s.name}（${s.field}）</option>`).join('');
  const hasKey = !!(state.llm && state.llm.apiKey);
  const voiceOn = !!state.voiceMode;
  const ttsOk = TTS.available(), sttOk = STT.available();
  const ov = mode === 'overlay';
  const q = sel => host.querySelector(sel);
  const rebuild = () => buildChatInto(host, mode);
  host.innerHTML = `
    ${ov ? '' : '<h2>💬 问数学家</h2>'}
    <div class="subtitle">挑一位历代大数学家，用 TA 的口吻给你答疑。可 💬 打字、🎤 说话、或 📞 语音通话。<br>首次用请点 <b>⚙️ 设置</b> 填一个 API Key（只存在你这台电脑里）。</div>
    <div class="ask-bar">
      <span style="color:var(--text-dim)">导师：</span>
      <select id="askSci" style="min-width:210px">${opts}</select>
      <button class="mini ask-entry" id="enterVoiceChat" title="像打电话那样：你说一句他答一句、自动朗读">📞 语音通话</button>
      <span class="voice-toggle ${voiceOn?'on':''}" id="voiceToggle" title="打字聊天时，让数学家的回答自动朗读">${voiceOn?'🔊 朗读：开':'🔊 朗读：关'}</span>
      <button class="mini" id="askReset">🔄 重开</button>
      <button class="mini" id="askSet">⚙️ 设置</button>
      <button class="mini" id="askStop" title="声音停不下来时点这里">⏹ 静音</button>
      <span class="api-pill" style="color:${hasKey?'var(--green)':'var(--red)'}">${hasKey?'● 已配置':'● 未配置 Key'}</span>
    </div>
    ${(!ttsOk||!sttOk) ? `<div style="font-size:12px;color:var(--gold-soft);text-align:center;margin-bottom:8px">⚠️ 你的浏览器${!ttsOk?' 不支持朗读':''}${!sttOk?' 不支持语音输入':''}，建议用 <b>Chrome</b> 或 <b>Edge</b>。</div>` : ''}
    <div class="chat-area" id="chatArea" ${ov?'style="flex:1;height:auto;min-height:200px"':''}></div>
    <div class="preset-row" id="presetRow"></div>
    <div class="input-row">
      <textarea id="askInput" placeholder="问个数学问题，例如：为什么负负得正？（回车发送，Shift+回车换行）也可点 🎤 用嘴问"></textarea>
      <button class="mic-btn" id="micBtn" title="点击说话（再点一次结束）">🎤</button>
      <button class="primary" id="askSend">发送</button>
    </div>
    ${ov ? '' : '<div class="btn-row"><button id="askBack">← 返回主菜单</button></div>'}
  `;
  const chatArea = q('#chatArea');
  function appendMsg(role, content, sci=null) {
    let b;
    if (role==='user') { b = el('div','bubble user', mdRender(content)); chatArea.appendChild(b); }
    else {
      b = el('div','bubble sci');
      b.innerHTML = `<div class="sci-head"><div class="face-mini">${sci?sci.face:'🧑‍🏫'}</div><div>${sci?sci.name:'数学家'} · ${sci?sci.field:''}</div></div><div class="content">${mdRender(content)}</div>`;
      $('.sci-head', b).appendChild(ttsButton(content, sci?sci.id:'', '🔊 听'));
      chatArea.appendChild(b);
    }
    chatArea.scrollTop = chatArea.scrollHeight; return b;
  }
  if (!state.chatConv.length) {
    const greet = `你好！我是 **${curSci.name}**（${curSci.years}），主攻${curSci.field}。\n你想问什么数学问题？随便问，我会用我那个时代的眼光，加上你能听懂的方式，来给你讲清楚。`;
    const b = appendMsg('sci', greet, curSci);
    if (voiceOn && b) TTS.speak(greet, curSci.id, $('.tts-btn', b));
  } else {
    state.chatConv.forEach(m => m.role==='user' ? appendMsg('user', m.content) : appendMsg('sci', m.content, curSci));
  }
  chatArea.scrollTop = chatArea.scrollHeight;
  // 起手问题 chips
  const pr = q('#presetRow');
  STARTER_QS.slice().sort(()=>Math.random()-0.5).slice(0,5).forEach(qq=>{
    const b = el('button','', qq); b.onclick = ()=>{ const i = q('#askInput'); i.value = qq; i.focus(); }; pr.appendChild(b);
  });
  const dice = el('button','','🎲 换一组'); dice.onclick = ()=>rebuild(); pr.appendChild(dice);
  // 事件
  q('#askSci').onchange = ev=>{ TTS.stop(); state.chatSci=ev.target.value; state.chatConv=[]; saveState(); rebuild(); };
  q('#askReset').onclick = ()=>{ TTS.stop(); state.chatConv=[]; saveState(); rebuild(); };
  q('#askSet').onclick = openLLMSettings;
  q('#askStop').onclick = ()=>{ TTS.stop(); STT.stop(); const mb=q('#micBtn'); if (mb) mb.classList.remove('recording'); };
  q('#voiceToggle').onclick = ()=>{ state.voiceMode = !state.voiceMode; saveState(); TTS.stop(); STT.stop(); rebuild(); };
  q('#enterVoiceChat').onclick = ()=>{ TTS.stop(); STT.stop(); VoiceChat.enter(state.chatSci); };
  const backBtn = q('#askBack'); if (backBtn) backBtn.onclick = ()=>sceneMenu();
  const input = q('#askInput');
  input.onkeydown = ev=>{ if (ev.key==='Enter' && !ev.shiftKey) { ev.preventDefault(); send(); } };
  q('#askSend').onclick = send;
  const micBtn = q('#micBtn');
  micBtn.onclick = ()=>{
    if (STT.instance) { STT.stop(); return; }
    if (!sttOk) { toast('当前浏览器不支持语音输入'); return; }
    TTS.stop(); micBtn.classList.add('recording');
    let finalText = '';
    STT.start({
      onResult: (text, isFinal)=>{ input.value = text; if (isFinal) finalText = text; },
      onError: (err)=>{ toast('语音输入失败：'+err); },
      onEnd: ()=>{ micBtn.classList.remove('recording'); if ((finalText || input.value.trim()) && state.voiceMode) setTimeout(send, 200); }
    });
  };
  async function send() {
    const text = input.value.trim(); if (!text) return;
    if (!state.llm || !state.llm.apiKey) { openLLMSettings(); return; }
    TTS.stop();
    input.value=''; input.disabled=true; q('#askSend').disabled=true;
    state.chatConv.push({ role:'user', content:text }); appendMsg('user', text);
    const thinking = el('div','bubble sci thinking', `<div class="sci-head"><div class="face-mini">${curSci.face}</div><div>${curSci.name} 正在思考…</div></div>`);
    chatArea.appendChild(thinking); chatArea.scrollTop = chatArea.scrollHeight;
    try {
      const sys = state.voiceMode
        ? buildSystemPrompt(curSci) + '\n\n【特别注意】此刻是语音对话：回复 (a) 80~160 字；(b) 口语化、像聊天；(c) 避免长公式和列表，可用比喻；(d) 末尾留一个开放问题让孩子接话。'
        : buildSystemPrompt(curSci);
      const reply = await callLLM([{ role:'system', content:sys }, ...state.chatConv.map(m=>({role:m.role,content:m.content}))]);
      thinking.remove();
      state.chatConv.push({ role:'assistant', content:reply });
      const b = appendMsg('sci', reply, curSci);
      state.chatAsked = (state.chatAsked||0)+1; saveState();
      if (state.voiceMode && b) TTS.speak(reply, curSci.id, $('.tts-btn', b));
    } catch(e) {
      thinking.remove();
      appendMsg('sci', '**调用失败**：'+e.message+'\n\n点 ⚙️ 设置检查 API Key / Base URL，或换一个服务商。', curSci);
    } finally { input.disabled=false; q('#askSend').disabled=false; input.focus(); }
  }
}
// 整页版（主菜单进入）
function sceneAsk() {
  render('<div id="askHost" style="width:100%;display:flex;flex-direction:column;flex:1;min-height:0"></div>');
  buildChatInto(document.getElementById('askHost'), 'scene');
}
// 💬 直接对话浮层（任何画面、答题中都能开，不离开当前页）
function openChatOverlay() {
  closeFabMenu();
  if (document.getElementById('chatOvMask')) return;
  const mask = el('div','chat-ov-mask'); mask.id = 'chatOvMask';
  mask.innerHTML = `<div class="chat-ov-panel"><div class="chat-ov-head"><span>💬 问数学家</span><button class="mini chat-ov-close">✖ 关闭</button></div><div class="chat-ov-body" id="chatOvBody"></div></div>`;
  document.body.appendChild(mask);
  mask.querySelector('.chat-ov-close').onclick = ()=>{ TTS.stop(); STT.stop(); mask.remove(); };
  mask.onclick = (e)=>{ if (e.target===mask) { TTS.stop(); STT.stop(); mask.remove(); } };
  buildChatInto(mask.querySelector('#chatOvBody'), 'overlay');
}
// 🧑‍🏫 全局悬浮 AI 助教球：一键直达 💬 直接问 / 📞 语音通话
function ensureChatFab() {
  if (document.getElementById('aiFab')) return;
  const wrap = el('div','ai-fab-wrap'); wrap.id = 'aiFab';
  wrap.innerHTML = `
    <div class="ai-fab-menu" id="aiFabMenu">
      <button class="ai-fab-act" data-act="chat">💬 直接问</button>
      <button class="ai-fab-act" data-act="call">📞 语音通话</button>
    </div>
    <button class="ai-fab-ball" title="问数学家 · 随时点我">🧑‍🏫</button>`;
  document.body.appendChild(wrap);
  const menu = wrap.querySelector('#aiFabMenu');
  wrap.querySelector('.ai-fab-ball').onclick = (e)=>{ e.stopPropagation(); menu.classList.toggle('open'); };
  wrap.querySelector('[data-act=chat]').onclick = (e)=>{ e.stopPropagation(); menu.classList.remove('open'); openChatOverlay(); };
  wrap.querySelector('[data-act=call]').onclick = (e)=>{ e.stopPropagation(); menu.classList.remove('open'); if (!state.chatConv) state.chatConv = []; VoiceChat.enter(state.chatSci); };
  document.addEventListener('click', ()=>menu.classList.remove('open'));
}
function closeFabMenu() { const m = document.getElementById('aiFabMenu'); if (m) m.classList.remove('open'); }

function openLLMSettings() {
  const cfg = state.llm || { baseUrl:'https://api.deepseek.com/v1', model:'deepseek-chat', apiKey:'' };
  const presetBtns = LLM_PRESETS.map(p=>`<button data-pre="${p.id}" style="font-size:12px;padding:7px 11px;border-radius:999px">${p.label}</button>`).join(' ');
  const mask = el('div','llm-mask');
  mask.innerHTML = `
    <div class="llm-modal">
      <h2>⚙️ AI 接口设置</h2>
      <div style="font-size:13px;color:var(--text-dim);text-align:center;margin:8px 0 14px">API Key 只保存在你本机浏览器（localStorage），不会上传任何服务器。</div>
      <div style="font-size:13px;margin-bottom:8px">快速预设（点一下自动填好地址和模型，再粘贴你的 Key）：</div>
      <div class="preset-row" style="justify-content:flex-start" id="lpre">${presetBtns}</div>
      <div class="setting-grid">
        <div><label>Base URL（OpenAI 兼容接口）</label><input id="lUrl" value="${cfg.baseUrl||''}" placeholder="https://api.deepseek.com/v1"></div>
        <div><label>模型名 Model</label><input id="lModel" value="${cfg.model||''}" placeholder="deepseek-chat / qwen-plus / gpt-4o-mini ..."></div>
        <div><label>API Key</label><input id="lKey" type="password" value="${cfg.apiKey||''}" placeholder="sk-..."></div>
        <div id="lStatus" style="font-size:13px;color:var(--text-dim);min-height:18px"></div>
      </div>
      <div class="btn-row" style="margin-top:6px">
        <button id="lTest">🔬 测试连接</button>
        <button class="primary" id="lSave">保存</button>
        <button id="lCancel">取消</button>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:14px;line-height:1.85">
        ※ <b>国内直连·推荐</b>：DeepSeek / 通义千问 / 智谱GLM / Kimi —— 免代理、便宜、中文好，适合天天用。<br>
        ※ <b>Claude</b>：浏览器可直连（已自动加直连授权头）；到 <b>console.anthropic.com</b> 申请 Key。最强 <code>claude-opus-4-8</code>、聪明 <code>claude-sonnet-4-6</code>、便宜快 <code>claude-haiku-4-5</code>；需科学上网。<br>
        ※ <b>Gemini / GPT</b>：官方地址需代理；其中 Gemini 官方接口<b>不支持浏览器直连</b>（CORS），要在 Base URL 填你自己的中转/代理地址才能跑。Gemini 的 Key 可在 <b>aistudio.google.com</b> 免费申请。<br>
        ※ <b>订阅 ≠ API</b>：ChatGPT Plus / Claude Pro / Gemini Advanced 这类网页会员<b>不能</b>直接用在这里——它们和开发者 API 是两套独立计费、额度不互通。要让这里能答题，必须单独申请一个 API Key（DeepSeek 极便宜、Gemini 有免费额度）。<br>
        ※ Key 只存在你这台电脑的浏览器里，不上传任何服务器。本工具仅供自家本地使用，<b>别把填了 Key 的网页公开分享</b>。
      </div>
    </div>`;
  document.body.appendChild(mask);
  mask.querySelectorAll('[data-pre]').forEach(b=>b.onclick=ev=>{
    const p = LLM_PRESETS.find(x=>x.id===ev.currentTarget.dataset.pre);
    $('#lUrl',mask).value = p.baseUrl; $('#lModel',mask).value = p.model; $('#lKey',mask).focus();
  });
  $('#lCancel',mask).onclick = ()=>mask.remove();
  $('#lSave',mask).onclick = ()=>{
    state.llm = { baseUrl: $('#lUrl',mask).value.trim() || 'https://api.deepseek.com/v1', model: $('#lModel',mask).value.trim() || 'deepseek-chat', apiKey: $('#lKey',mask).value.trim() };
    saveState(); mask.remove(); toast('✅ 已保存');
    const _ov = document.getElementById('chatOvBody');
    if (_ov) buildChatInto(_ov, 'overlay'); else if ($('#chatArea')) sceneAsk();
  };
  $('#lTest',mask).onclick = async ()=>{
    const st = $('#lStatus',mask); st.style.color='var(--gold-soft)'; st.textContent='测试中…';
    const backup = state.llm;
    state.llm = { baseUrl: $('#lUrl',mask).value.trim(), model: $('#lModel',mask).value.trim(), apiKey: $('#lKey',mask).value.trim() };
    try {
      const r = await callLLM([{ role:'system', content:'你只回复两个字：你好' }, { role:'user', content:'请回复' }]);
      st.style.color='var(--green)'; st.textContent='✅ 连接成功！示例回复：'+String(r).slice(0,40);
    } catch(e) { st.style.color='var(--red)'; st.textContent='❌ '+e.message; }
    finally { state.llm = backup; }
  };
}

// 挂上全局悬浮 AI 助教球（在 body 上，跨 render 常驻）
ensureChatFab();

// ============================================
// 启动
// ============================================
updateStreak();
checkDailyReward();
sceneMenu();
</script>
</body>
</html>
